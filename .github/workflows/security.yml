name: Security Scan

on:
  pull_request:
    branches: [main, "feature/**"]
  push:
    branches: [main]

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit (block on CRITICAL)
        run: pip-audit -r requirements.txt --severity CRITICAL --fail-on-vulnerability

  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --legacy-peer-deps
      - name: npm audit (block on HIGH)
        run: npm audit --audit-level=high

  sast:
    name: SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r api/ celery_workers/ platform_adapters/ utils/ media_pipeline/ db/ -ll -ii --exclude ./tests
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/fastapi
            p/mongodb
            p/secrets
            p/owasp-top-ten

  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t socialentangler-api:scan .
      - name: Trivy scan (block on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "socialentangler-api:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
