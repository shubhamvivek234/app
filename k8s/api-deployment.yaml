apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialentangler-api
  labels:
    app: socialentangler
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socialentangler
      component: api
  template:
    metadata:
      labels:
        app: socialentangler
        component: api
    spec:
      containers:
      - name: api
        image: socialentangler-api:latest
        ports:
        - containerPort: 8001
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: socialentangler-secrets
              key: MONGO_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: socialentangler-secrets
              key: REDIS_URL
        envFrom:
        - secretRef:
            name: socialentangler-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: socialentangler-api
spec:
  selector:
    app: socialentangler
    component: api
  ports:
  - port: 8001
    targetPort: 8001
