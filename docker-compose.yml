version: "3.9"

# Phase 1.8 + Phase 4 — Local dev Docker Compose
# Phase 4 adds: Prometheus, Grafana, Pushgateway, redis-exporter × 2, mongodb-exporter
# All services required for full local development.
# redis-queue: noeviction (jobs MUST NOT be evicted)
# redis-cache: allkeys-lru (safe to evict cached data)

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    command: >
      celery -A celery_workers.celery_app worker
      --loglevel=info --concurrency=4
      --queues=high_priority,default,dead_letter
    restart: unless-stopped

  media-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.media
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    command: >
      celery -A celery_workers.celery_app worker
      --loglevel=info --concurrency=2
      --queues=media_processing
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - mongodb
    # WARNING: Never scale replicas > 1 — causes duplicate job enqueueing
    command: >
      celery -A celery_workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_queue_data:/data
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_cache_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Phase 4: Monitoring stack ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # Receives pushed metrics from Celery worker processes
  pushgateway:
    image: prom/pushgateway:v1.8.0
    ports:
      - "9091:9091"
    restart: unless-stopped

  # Redis metrics exporters
  redis-exporter-queue:
    image: oliver006/redis_exporter:v1.58.0-alpine
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis-queue:6379
    depends_on:
      - redis-queue
    restart: unless-stopped

  redis-exporter-cache:
    image: oliver006/redis_exporter:v1.58.0-alpine
    ports:
      - "9122:9121"
    environment:
      - REDIS_ADDR=redis://redis-cache:6379
    depends_on:
      - redis-cache
    restart: unless-stopped

  # MongoDB metrics exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/admin
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  redis_queue_data:
  redis_cache_data:
  mongo_data:
  prometheus_data:
  grafana_data:
