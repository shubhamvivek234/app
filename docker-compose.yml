version: "3.9"

# Phase 1.8 — Local dev Docker Compose
# All services required for full local development.
# redis-queue: noeviction (jobs MUST NOT be evicted)
# redis-cache: allkeys-lru (safe to evict cached data)

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    command: >
      celery -A celery_workers.celery_app worker
      --loglevel=info --concurrency=4
      --queues=high_priority,default,dead_letter
    restart: unless-stopped

  media-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.media
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - redis-cache
      - mongodb
    command: >
      celery -A celery_workers.celery_app worker
      --loglevel=info --concurrency=2
      --queues=media_processing
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    env_file: .env
    environment:
      - ENV=development
    depends_on:
      - redis-queue
      - mongodb
    # WARNING: Never scale replicas > 1 — causes duplicate job enqueueing
    command: >
      celery -A celery_workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_queue_data:/data
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_cache_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_queue_data:
  redis_cache_data:
  mongo_data:
