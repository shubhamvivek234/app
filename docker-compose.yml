# SocialEntangler — Docker Compose (Production-Ready, Single VPS)
# Architecture v2.8 Addendum — Section A.2.1 (VPS over Kubernetes at launch)
#
# Runs: API server + Celery worker + Celery Beat + Redis
# MongoDB Atlas is external (cloud-managed)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f api    # Tail API logs
#   docker-compose down           # Stop all services
#   docker-compose ps             # Check health status

version: "3.9"

x-common-env: &common-env
  MONGO_URL: ${MONGO_URL}
  MONGODB_URI: ${MONGODB_URI:-${MONGO_URL}}
  DB_NAME: ${DB_NAME}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  REDIS_URL: redis://redis:6379/0
  REDIS_CACHE_URL: ${REDIS_CACHE_URL:-}
  REDIS_QUEUE_URL: ${REDIS_QUEUE_URL:-}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-https://api.unravler.com}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.unravler.com,https://unravler.com,https://www.unravler.com}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://app.unravler.com,https://unravler.com,https://www.unravler.com}
  FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
  FIREBASE_ADMIN_SDK_JSON: ${FIREBASE_ADMIN_SDK_JSON:-/app/serviceAccountKey.json}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
  FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
  FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
  FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI}
  INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID}
  INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
  INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI}
  INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:-}
  META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
  TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID}
  TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET}
  TWITTER_REDIRECT_URI: ${TWITTER_REDIRECT_URI}
  LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
  LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
  LINKEDIN_REDIRECT_URI: ${LINKEDIN_REDIRECT_URI}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  SENDER_EMAIL: ${SENDER_EMAIL:-onboarding@resend.dev}
  STRIPE_API_KEY: ${STRIPE_API_KEY:-}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ENV: ${ENV:-production}

services:
  # ── Redis (job queue + cache) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app_net

  # ── Nginx (reverse proxy + TLS termination) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/app/frontend/build:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    command: celery -A celery_workers.celery_app worker --loglevel=info --concurrency=8 --max-tasks-per-child=100 --queues=high_priority,default,dead_letter
    # Scale tip: run multiple worker containers for higher throughput
    # e.g. docker-compose up -d --scale worker=5  → 5 × 8 = 40 concurrent slots
    environment:
      <<: *common-env
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net
    # Graceful shutdown: give workers 120s to finish in-flight tasks
    stop_grace_period: 120s

  # ── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    restart: unless-stopped
    command: celery -A celery_workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      <<: *common-env
    volumes:
      - beat_schedule:/app/beat_schedule
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net

volumes:
  redis_data:
  uploads:
  beat_schedule:
  nginx_logs:

networks:
  app_net:
    driver: bridge
